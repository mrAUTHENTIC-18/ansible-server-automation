---
- name: Deploy Custom Web Page
  hosts: webservers
  become: yes

  tasks:
    - name: Install Nginx
      dnf:
        name: nginx
        state: present

    - name: Ensure Nginx is running
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Deploy custom index page
      copy:
        content: |
          <h1>Congratulations Palmer!</h1>
          <h2>Your first Ansible Playbook worked! </h2>
        dest: /usr/share/nginx/html/index.html
